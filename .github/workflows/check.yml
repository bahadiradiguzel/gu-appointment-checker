name: Utrecht Randevu Kontrolü

on:
  schedule:
    # Her 5 dakikada bir (GitHub Actions minimum aralığı)
    - cron: "*/5 * * * *"
  workflow_dispatch: # Actions sekmesinden "Run workflow" ile manuel tetikleme

jobs:
  check-appointments:
    runs-on: ubuntu-latest

    permissions:
      contents: write # state.json'u repoya commit edebilmek için

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run appointment checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
